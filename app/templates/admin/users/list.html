{% extends 'base.html' %}
{% block content %}
<section>
  <h1>Users</h1>
  <div class="table-wrap card">
    <table class="data-table">
      <caption>Registered users</caption>
      <thead><tr><th scope="col">Email</th><th scope="col">Name</th><th scope="col">Role</th><th scope="col">Active</th><th scope="col">Actions</th></tr></thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.email }}</td><td>{{ user.full_name }}</td><td>{{ user.role.value }}</td><td>{{ 'Yes' if user.is_active else 'No' }}</td>
          <td><a href="{{ url_for('admin.user_edit', user_id=user.id) }}">Edit</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
