<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title | default('Data Cataloger') }}{% endblock %} · Data Cataloger</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('index') }}">Data Cataloger</a>
      {% if current_user.is_authenticated %}
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ url_for('catalogue.list_datasets') }}">Catalogue</a>
        <a href="{{ url_for('catalogue.my_requests') }}">My requests</a>
        {% if current_user.role.value == 'admin' %}
        <a href="{{ url_for('admin.dashboard') }}">Admin</a>
        {% endif %}
      </nav>
      <div class="session">
        <span class="session-user">{{ current_user.full_name }}</span>
        <form method="post" action="{{ url_for('auth.logout') }}" class="inline-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-secondary">Sign out</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>

  <main id="main-content" class="container main-content">
    {% include 'partials/flash.html' %}
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Data Cataloger</p>
    </div>
  </footer>
</body>
</html>
